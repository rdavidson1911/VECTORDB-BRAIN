services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: omnikb-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ${QDRANT_STORAGE_PATH:-./data/qdrant}:/qdrant/storage
    healthcheck:
      test: ["CMD", "qdrant", "--help"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnikb-api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      # Override the env_file value so the container always sees its own bind-mount path,
      # not the host-relative path used by Docker Compose for the volume declaration.
      DATA_SOURCES_PATH: /data/sources
      HOST_DATA_SOURCES_PATH: ${HOST_DATA_SOURCES_PATH:-}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${DATA_SOURCES_PATH:-./data/sources}:/data/sources:ro
      - ${PROCESSED_DATA_PATH:-./data/processed}:/data/processed
      - ${OMNIKB_LOGS_DIR:-./logs}:/app/logs
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  # Local dev only: captures SMTP on 1025; web UI at http://127.0.0.1:1080
  # Start with: docker compose --profile dev-mail up -d mailcatcher
  mailcatcher:
    image: schickling/mailcatcher:latest
    container_name: omnikb-mailcatcher
    profiles: [dev-mail]
    ports:
      - "127.0.0.1:${MAILCATCHER_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILCATCHER_WEB_PORT:-1081}:1080"
    restart: unless-stopped
